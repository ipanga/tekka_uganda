name: CI - API

# PR-time and develop-push checks for the NestJS backend.
# Catches lint failures, type errors, broken Prisma schemas, failing
# unit tests, and broken builds before they can reach main.

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/api/**'
      - '.github/workflows/ci-api.yml'
  push:
    branches: [develop]
    paths:
      - 'apps/api/**'
      - '.github/workflows/ci-api.yml'
  workflow_dispatch:

env:
  WORKING_DIRECTORY: apps/api
  NODE_VERSION: '20'

jobs:
  ci:
    name: Lint, type-check, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Lint
        run: npm run lint -- --max-warnings 0 || npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test -- --ci --reporters=default

      - name: Build
        run: npm run build
