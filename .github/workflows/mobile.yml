name: Mobile CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile.yml'
  workflow_dispatch:
  workflow_call:

env:
  WORKING_DIRECTORY: apps/mobile
  FLUTTER_VERSION: '3.41.1'
  JAVA_VERSION: '17'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      contents: write       # so the auto-commit step can push format fixes on PRs
      pull-requests: write  # so the auto-commit action can post a status comment
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # On a pull_request event, default checkout is a detached merge commit.
          # We need the PR head ref so format fixes land on the contributor's branch.
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          cache-key: flutter-${{ env.FLUTTER_VERSION }}-${{ runner.os }}

      - name: Get dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: flutter pub get

      - name: Run code generation
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze code
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: flutter analyze --no-fatal-infos

      - name: Apply dart format
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: dart format lib/

      - name: Auto-commit format fixes (pull_request only)
        if: github.event_name == 'pull_request'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: dart format'
          file_pattern: 'apps/mobile/lib/**/*.dart'
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com

      - name: Fail if formatting changed on a non-PR run
        if: github.event_name != 'pull_request'
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          if [ -n "$(git diff --name-only lib/)" ]; then
            echo "::error::dart format produced changes. Run 'dart format apps/mobile/lib/' locally and commit before pushing to ${{ github.ref_name }}."
            git diff --name-only lib/
            exit 1
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [analyze]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          cache-key: flutter-${{ env.FLUTTER_VERSION }}-${{ runner.os }}

      - name: Get dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: flutter pub get

      - name: Run code generation
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests with coverage
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: flutter test --coverage || true

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: ${{ env.WORKING_DIRECTORY }}/coverage
          flags: mobile
          fail_ci_if_error: false

  build-android:
    name: Build Android (Dev)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          cache-key: flutter-${{ env.FLUTTER_VERSION }}-${{ runner.os }}

      - name: Get dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: flutter pub get

      - name: Run code generation
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (dev debug)
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: flutter build apk --debug --flavor dev -t lib/main_dev.dart

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-dev-debug-apk
          path: ${{ env.WORKING_DIRECTORY }}/build/app/outputs/flutter-apk/app-dev-debug.apk
          retention-days: 7

  build-android-release:
    name: Build Android Release (Prod)
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          cache-key: flutter-${{ env.FLUTTER_VERSION }}-${{ runner.os }}

      - name: Inject google-services.json
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          mkdir -p android/app/src/prod
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/src/prod/google-services.json

      - name: Get dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: flutter pub get

      - name: Run code generation
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build App Bundle (prod release)
        working-directory: ${{ env.WORKING_DIRECTORY }}
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN_MOBILE }}
          SENTRY_ENVIRONMENT: production
          SENTRY_RELEASE: tekka-mobile@1.2.2+34-${{ github.sha }}
        run: |
          # --dart-define wires SENTRY_DSN / _ENVIRONMENT / _RELEASE into
          # the compiled Dart code (see apps/mobile/lib/core/observability/
          # sentry.dart). --obfuscate + --split-debug-info produces
          # symbol files in build/app/outputs/symbols/ that we upload
          # to Sentry in the next step so crash stack traces in prod
          # builds are symbolicated.
          flutter build appbundle --release --flavor prod -t lib/main.dart \
            --obfuscate \
            --split-debug-info=build/app/outputs/symbols \
            --no-tree-shake-icons \
            --dart-define=SENTRY_DSN="$SENTRY_DSN" \
            --dart-define=SENTRY_ENVIRONMENT="$SENTRY_ENVIRONMENT" \
            --dart-define=SENTRY_RELEASE="$SENTRY_RELEASE" \
            || flutter build apk --release --flavor prod -t lib/main.dart \
                 --obfuscate \
                 --split-debug-info=build/app/outputs/symbols \
                 --dart-define=SENTRY_DSN="$SENTRY_DSN" \
                 --dart-define=SENTRY_ENVIRONMENT="$SENTRY_ENVIRONMENT" \
                 --dart-define=SENTRY_RELEASE="$SENTRY_RELEASE"

      - name: Upload Android debug symbols to Sentry
        # `sentry-cli debug-files upload` finds the .symbols files
        # produced by `--split-debug-info` and uploads them so Sentry can
        # symbolicate obfuscated stack traces. Idempotent — re-runs over
        # the same release just no-op on already-uploaded files.
        working-directory: ${{ env.WORKING_DIRECTORY }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: tekka-uganda
          SENTRY_PROJECT: tekka-mobile
          SENTRY_RELEASE: tekka-mobile@1.2.2+34-${{ github.sha }}
        run: |
          curl -sL https://sentry.io/get-cli/ | bash
          sentry-cli releases new "$SENTRY_RELEASE"
          sentry-cli debug-files upload --include-sources build/app/outputs/symbols/
          # Also upload the AAB's mapping.txt if it exists (Proguard/R8).
          if [ -f build/app/outputs/mapping/prodRelease/mapping.txt ]; then
            sentry-cli debug-files upload build/app/outputs/mapping/prodRelease/mapping.txt
          fi
          sentry-cli releases set-commits "$SENTRY_RELEASE" --auto || true
          sentry-cli releases finalize "$SENTRY_RELEASE"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-prod-release
          path: |
            ${{ env.WORKING_DIRECTORY }}/build/app/outputs/bundle/prodRelease/*.aab
            ${{ env.WORKING_DIRECTORY }}/build/app/outputs/flutter-apk/app-prod-release.apk
          retention-days: 30

  build-ios:
    name: Build iOS (Dev)
    runs-on: macos-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          cache-key: flutter-${{ env.FLUTTER_VERSION }}-${{ runner.os }}

      - name: Seed placeholder GoogleService-Info.plist
        # Xcode's Resources build phase references the plist — it must exist
        # on disk during the build. The "Strip Firebase plist" Run Script
        # phase removes it from the final .app for non-prod configs, so the
        # placeholder never ships and never executes.
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          cat > ios/Runner/GoogleService-Info.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict/></plist>
          PLIST

      - name: Get dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: flutter pub get

      - name: Run code generation
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS (dev debug, no codesign)
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: flutter build ios --no-codesign --debug --flavor dev -t lib/main_dev.dart

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: ios-dev-debug-build
          path: ${{ env.WORKING_DIRECTORY }}/build/ios/iphoneos
          retention-days: 7

  build-ios-release:
    name: Build iOS Release (Prod)
    runs-on: macos-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          cache-key: flutter-${{ env.FLUTTER_VERSION }}-${{ runner.os }}

      - name: Inject GoogleService-Info.plist
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 --decode > ios/Runner/GoogleService-Info.plist

      - name: Get dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: flutter pub get

      - name: Run code generation
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS Release (prod, no codesign)
        working-directory: ${{ env.WORKING_DIRECTORY }}
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN_MOBILE }}
          SENTRY_ENVIRONMENT: production
          SENTRY_RELEASE: tekka-mobile@1.2.2+34-${{ github.sha }}
        run: |
          flutter build ios --no-codesign --release --flavor prod -t lib/main.dart \
            --obfuscate \
            --split-debug-info=build/ios/symbols \
            --dart-define=SENTRY_DSN="$SENTRY_DSN" \
            --dart-define=SENTRY_ENVIRONMENT="$SENTRY_ENVIRONMENT" \
            --dart-define=SENTRY_RELEASE="$SENTRY_RELEASE"

      - name: Upload iOS debug symbols + dSYM to Sentry
        # Three artifacts go up:
        #   1. Dart split-debug-info (build/ios/symbols/) — symbolicates
        #      the Dart stack frames of any obfuscated release crash.
        #   2. Flutter framework dSYMs (Runner.app.dSYM/) — symbolicates
        #      native iOS frames that bubble into Dart from the engine.
        #   3. Sentry Cocoa SDK dSYMs (under Pods build dir) — same for
        #      Sentry's own native bridge.
        # `sentry-cli debug-files upload --include-sources` recursively
        # finds and uploads everything it can identify.
        working-directory: ${{ env.WORKING_DIRECTORY }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: tekka-uganda
          SENTRY_PROJECT: tekka-mobile
          SENTRY_RELEASE: tekka-mobile@1.2.2+34-${{ github.sha }}
        run: |
          curl -sL https://sentry.io/get-cli/ | bash
          sentry-cli releases new "$SENTRY_RELEASE" || true
          sentry-cli debug-files upload --include-sources build/ios/symbols/
          # Walk the iOS build output for dSYM bundles too.
          find build/ios/iphoneos -name '*.dSYM' -type d \
            -exec sentry-cli debug-files upload {} \; || true
          sentry-cli releases set-commits "$SENTRY_RELEASE" --auto || true
          sentry-cli releases finalize "$SENTRY_RELEASE"

      - name: Upload iOS release build
        uses: actions/upload-artifact@v4
        with:
          name: ios-prod-release-build
          path: ${{ env.WORKING_DIRECTORY }}/build/ios/iphoneos
          retention-days: 30
