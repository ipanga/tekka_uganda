name: CI - Admin Dashboard

# PR-time and develop-push checks for the Next.js admin site.
# Admin currently has no test suite; lint + type-check is the floor.

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/admin/**'
      - '.github/workflows/ci-admin.yml'
  push:
    branches: [develop]
    paths:
      - 'apps/admin/**'
      - '.github/workflows/ci-admin.yml'
  workflow_dispatch:

env:
  WORKING_DIRECTORY: apps/admin
  NODE_VERSION: '20'

jobs:
  ci:
    name: Lint, type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit
