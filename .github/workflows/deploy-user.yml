name: Deploy User Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'apps/user/**'
      - 'infra/docker/**'
      - '.github/workflows/deploy-user.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/tekka-user

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: apps/user
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'https://api.tekka.ug/api/v1' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: production
    permissions:
      packages: read
    env:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GHCR_USERNAME: ${{ github.actor }}
      IMAGE_TAG: sha-${{ github.sha }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          command_timeout: 15m
          envs: GHCR_TOKEN,GHCR_USERNAME,IMAGE_TAG
          script: |
            flock -w 300 /tmp/tekka-deploy.lock bash -c '
              set -euo pipefail
              cd /opt/tekka

              SERVICE=user
              LAST_GOOD_FILE="/opt/tekka/.last-good-${SERVICE}"
              PREVIOUS_TAG="$(cat "$LAST_GOOD_FILE" 2>/dev/null || true)"
              SMOKE_URL="https://tekka.ug/"
              export USER_IMAGE_TAG="$IMAGE_TAG"

              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

              git fetch origin main
              git reset --hard origin/main

              echo "Deploying $SERVICE @ $IMAGE_TAG (previous: ${PREVIOUS_TAG:-none})"
              docker compose -f infra/docker/docker-compose.prod.yml --env-file .env pull $SERVICE
              docker compose -f infra/docker/docker-compose.prod.yml --env-file .env up -d --force-recreate --remove-orphans $SERVICE

              STATUS=unknown
              for i in {1..30}; do
                STATUS=$(docker inspect --format="{{.State.Health.Status}}" tekka-$SERVICE 2>/dev/null || echo "unknown")
                [ "$STATUS" = "healthy" ] && break
                sleep 2
              done
              echo "Container health: $STATUS"

              if curl -fsS --max-time 10 "$SMOKE_URL" > /dev/null; then
                echo "Smoke test passed."
                echo "$IMAGE_TAG" > "$LAST_GOOD_FILE"
              else
                echo "Smoke test FAILED for $SMOKE_URL"
                if [ -n "$PREVIOUS_TAG" ] && [ "$PREVIOUS_TAG" != "$IMAGE_TAG" ]; then
                  echo "Rolling back to $PREVIOUS_TAG"
                  export USER_IMAGE_TAG="$PREVIOUS_TAG"
                  docker compose -f infra/docker/docker-compose.prod.yml --env-file .env up -d --force-recreate $SERVICE
                else
                  echo "No previous tag recorded; manual intervention required."
                fi
                exit 1
              fi

              docker image prune -f || true
            '
